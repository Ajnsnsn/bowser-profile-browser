<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'">
    <title>Bowser Browser</title>
    <link rel="stylesheet" href="./browser-shell.css">
  </head>
  <body>
    <header class="browser-toolbar">
      <div class="nav-controls">
        <button id="back" type="button" aria-label="Kembali" title="Kembali (Alt+Kiri)" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.42-1.41L7.83 13H20v-2Z"/></svg>
        </button>
        <button id="forward" type="button" aria-label="Maju" title="Maju (Alt+Kanan)" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 4-1.42 1.41L16.17 11H4v2h12.17l-5.59 5.59L12 20l8-8-8-8Z"/></svg>
        </button>
        <button id="reload" type="button" aria-label="Muat ulang" title="Muat ulang (Ctrl+R)">
          <svg class="reload-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.75 10h-2.1A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h8V3l-3.35 3.35Z"/></svg>
          <svg class="stop-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6h12v12H6z"/></svg>
        </button>
        <button id="home" type="button" aria-label="Beranda" title="Buka URL awal">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3-9 8h3v9h5v-6h2v6h5v-9h3l-9-8Z"/></svg>
        </button>
      </div>

      <form class="address-bar" id="address-form">
        <span class="security-indicator" id="security-indicator" title="Status koneksi">
          <svg class="lock-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M17 8h-1V6a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2Zm-7-2a2 2 0 1 1 4 0v2h-4V6Zm7 13H7v-9h10v9Z"/></svg>
          <svg class="info-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M11 17h2v-6h-2v6Zm1-15a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16ZM11 9h2V7h-2v2Z"/></svg>
        </span>
        <input id="address" type="text" autocomplete="off" spellcheck="false" aria-label="Alamat situs" placeholder="Cari atau masukkan alamat">
        <span class="loading-line" id="loading-line"></span>
      </form>

      <div class="profile-chip" title="Profil aktif">
        <span class="profile-dot"></span>
        <span id="profile-name">Profil</span>
      </div>
    </header>
    <script src="./browser-shell.js"></script>
  </body>
</html>
